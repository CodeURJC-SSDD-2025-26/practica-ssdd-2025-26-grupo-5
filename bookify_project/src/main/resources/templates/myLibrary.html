<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Biblioteca | BOOKIFY</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/myLibrary.css">
</head>

<body>

  <!-- Header -->
  {{>header}}
  <!-- End Header -->

  <main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold brand-color">Mis Colecciones</h2>
      <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#newCollectionModal">
        + Nueva Colección
      </button>
    </div>

    <div class="d-flex gap-2 mb-5 overflow-auto pb-2">
      <button class="btn btn-dark rounded-pill px-4">Todos</button>
      <button class="btn btn-outline-dark rounded-pill px-4">Favoritos</button>
      <button class="btn btn-outline-dark rounded-pill px-4">Pendientes</button>
    </div>

    <h4 class="mb-4">Mis Libros <span class="text-muted small">({{bookCount}})</span></h4>
    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-4">

      {{#Books}}
      <div class="col">
        <div class="card h-100 border-0 shadow-sm book-card">
          <a href="/book/{{id}}">
            <img
              src="{{coverUrl}}"
              class="card-img-top rounded" alt="Cover">
          </a>
          <div class="card-body p-2">
            <h6 class="card-title mb-1 small fw-bold text-center">{{title}}</h6>

            <div class="mt-2 text-center">
              <div class="d-flex justify-content-between x-small mb-1">
                <span class="text-muted">Progreso</span>
                <span class="fw-bold">40 / 310</span>
              </div>
              <div class="progress mb-2">
                <div class="progress-bar custom-progress" role="progressbar" data-progress="13"></div>
              </div>

              <div class="input-group input-group-sm">
                <input type="number" class="form-control" placeholder="Página" min="0" max="310">
                <button class="btn btn-outline-dark" type="button">Actualizar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      {{/Books}}

    </div>
  </main>

  <div class="modal fade" id="newCollectionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Crear Nueva Colección</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="text" class="form-control"
            placeholder="Nombre de la colección (por ejemplo, Lecturas de verano)">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-custom">Crear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  {{>footer}}
  <!-- End Footer -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/bookProgress.js"></script>

</body>

</html>
