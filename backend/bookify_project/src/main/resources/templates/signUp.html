<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookify | Tu Biblioteca Personal</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<main class="flex-fill d-flex justify-content-center align-items-center">

    <div class="login-wrapper text-center">

        <h1 class="login-title">
            <a href="index.html" class="title-link">BOOKIFY</a>
        </h1>

        <div class="login-box">

            <form>

                <div class="input-group-custom">
                    <label for="username">User</label>
                    <input type="text" id="username">
                </div>

                <div class="input-group-custom">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>

                <div class="input-group-custom">
                    <label for="password">Password</label>
                    <input type="password" id="password">
                </div>

                <div class="input-group-custom">
                    <label for="repeat-password">Repeat Password</label>
                    <input type="password" id="repeat-password">
                </div>

                <div class="login-button-wrapper">
                    <button type="submit" class="btn btn-custom w-25">Register</button>
                </div>

                <a>Already a member?</a>
                <a href="/login" class="create-account"> Log in</a>

            </form>

        </div>

    </div>

</main>

<!-- Footer -->
{{>footer}}
<!-- End Footer -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
